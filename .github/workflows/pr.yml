---
name: PR testing

# run on each PR and on merges to main
on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # this validates the Gemfile and Rakefile that will be copied into the build container
  # they provide tasks that will be used to compile ezbake projects and build packages
  validate-staging-templates:
    name: Validate Ruby
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: resources/puppetlabs/lein-ezbake/template/global
      - run: bundle env
        working-directory: resources/puppetlabs/lein-ezbake/template/global

  get-ezbake-version:
    name: get ezbake version
    runs-on: ubuntu-24.04
    outputs:
      ezbake_version: ${{ steps.version.outputs.ezbake_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # install clojure tools
      - name: Install Clojure tools
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: latest # Leiningen
      # used during the openvoxserver/db builds
      - name: Get release version
        id: version
        run: echo "ezbake_version=$(lein update-in :plugins conj '[lein-pprint "1.3.2"]' -- pprint :version | tr -d '\"')" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-24.04
    needs: validate-staging-templates
    strategy:
      matrix:
        java: [ '21', '25' ]
    env:
      LEIN_HOME: local

    name: Java ${{ matrix.java }} tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: setup java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      # install clojure tools
      - name: Install Clojure tools
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          # Install just one or all simultaneously
          # The value must indicate a particular version of the tool, or use 'latest'
          # to always provision the latest version
          lein: latest # Leiningen
      - run: lein test

  build:
    name: build ${{ matrix.project }}
    runs-on: ubuntu-24.04
    needs:
      - get-ezbake-version
    permissions:
      pull-requests: write # to comment on the PR
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: openvox-server
            repository: 'OpenVoxProject/openvox-server'
          - project: openvoxdb
            repository: 'OpenVoxProject/openvoxdb'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.repository }}
          submodules: true
          fetch-depth: 0 # So we fetch all history and tags and can build non-tagged versions
      - name: Setup ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - name: Display Ruby environment
        run: bundle env
      - id: docker-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/ezbake-builder.tar
          key: docker-ezbake-${{ matrix.project }}-${{ hashFiles('Dockerfile') }}
      - name: Load or build Docker image
        run: |
          if [[ -f /tmp/ezbake-builder.tar ]]; then
            docker load -i /tmp/ezbake-builder.tar
          else
            docker build -t ezbake-builder .
            docker save ezbake-builder -o /tmp/ezbake-builder.tar
          fi
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: always() && steps.docker-cache.outputs.cache-hit != 'true'
        with:
          path: /tmp/ezbake-builder.tar
          key: docker-ezbake-${{ matrix.project }}-${{ hashFiles('Dockerfile') }}
      - name: get ${{ matrix.project }} version
        id: version
        run: |
          DESCRIBE=$(git describe --abbrev=9)
          echo "describe=${DESCRIBE//-/.}" >> $GITHUB_OUTPUT
      - name: build ${{ matrix.project }} with ezbake ${{ needs.get-ezbake-version.outputs.ezbake_version }}
        run: bundle exec rake vox:build
        env:
          EZBAKE_REPO: "https://github.com/${{ github.repository }}" # https://github.com/actions/checkout?tab=readme-ov-file#usage
          EZBAKE_BRANCH: $GITHUB_REF # https://docs.github.com/en/actions/reference/workflows-and-actions/variables
          EZBAKE_VERSION: ${{ needs.get-ezbake-version.outputs.ezbake_version }} # ensures that we used the built version of ezbake and don't pull from clojars.org
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload
        with:
          name: ${{ matrix.project }}-${{ steps.version.outputs.describe }}-ezbake-${{ needs.get-ezbake-version.outputs.ezbake_version }}.zip
          path: output/
          retention-days: 1 # quite low retention, because the artifacts are quite large
          overwrite: true # overwrite old artifacts if a PR runs again (artifacts are per PR * per project)
      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        if: github.event.pull_request.head.repo.full_name == github.repository
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- build-artifacts -->'
      - name: Add or update comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: append
          body: |-
            <!-- build-artifacts -->
            The rpm/deb packages and the JAR file for ${{ github.repository }} are available in a zip archive:
            ${{ steps.upload.outputs.artifact-url }}
  automerge:
    name: Enable auto-merge
    if: github.event_name == 'pull_request' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: gh pr merge --auto --merge --match-head-commit "$PR_HEAD_SHA" "$PR_URL"
  tests:
    if: always()
    needs:
      - test
      - validate-staging-templates
      - build
      - get-ezbake-version
    runs-on: ubuntu-24.04
    name: Test suite
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
